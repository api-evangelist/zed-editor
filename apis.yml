aid: zed-editor
name: Zed
description: >-
  Zed is an open-source, high-performance multiplayer code editor written from
  scratch in Rust and built around GPU-accelerated rendering through its own
  GPUI framework. Created by Zed Industries — founded by Nathan Sobo, Antonio
  Scandurra, and Max Brunsfeld, the team behind Atom, Electron, and
  Tree-sitter — Zed combines a native desktop editor with real-time
  collaboration, native Git integration, Language Server Protocol and Debug
  Adapter Protocol support, and a first-class AI agent surface that includes
  edit prediction powered by the open-weight Zeta2 model, an inline assistant,
  parallel agents, and integrations with external coding agents (Claude,
  Codex, OpenCode) via the Agent Client Protocol (ACP) and Model Context
  Protocol (MCP). The editor itself is free and triple-licensed (AGPL /
  Apache-2.0 / GPL-3.0) with paid Pro and Business tiers that bundle hosted
  AI capabilities, edit prediction quotas, organization controls, and data
  governance. Zed runs on macOS, Linux, and Windows and exposes a WASM-based
  extension API (themes, languages, debuggers, snippets, MCP servers, agent
  servers) with extensions published through the zed-industries/extensions
  repository.
